<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Repair Entry | The Retail Editorial</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#a3f69c",
                        "tertiary": "#002103",
                        "surface-container": "#eceef1",
                        "on-tertiary-container": "#5aa958",
                        "surface-container-high": "#e6e8eb",
                        "primary-container": "#1a237e",
                        "inverse-on-surface": "#eff1f4",
                        "primary-fixed": "#e0e0ff",
                        "on-secondary-fixed-variant": "#003ab3",
                        "on-surface": "#191c1e",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f2f4f7",
                        "surface-container-highest": "#e0e3e6",
                        "outline": "#767683",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#f4f3ff",
                        "secondary-fixed": "#dce1ff",
                        "on-primary-container": "#8690ee",
                        "surface": "#f7f9fc",
                        "background": "#f7f9fc",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#000767",
                        "inverse-primary": "#bdc2ff",
                        "secondary-fixed-dim": "#b6c4ff",
                        "secondary": "#0048d8",
                        "inverse-surface": "#2d3133",
                        "on-primary-fixed-variant": "#343d96",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#88d982",
                        "surface-dim": "#d8dadd",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f7f9fc",
                        "on-tertiary-fixed": "#002204",
                        "on-secondary-fixed": "#001550",
                        "on-tertiary-fixed-variant": "#005312",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#4c56af",
                        "on-background": "#191c1e",
                        "primary": "#000666",
                        "outline-variant": "#c6c5d4",
                        "tertiary-container": "#003909",
                        "on-surface-variant": "#454652",
                        "surface-variant": "#e0e3e6",
                        "secondary-container": "#2761fe",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#bdc2ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #454652; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#191c1e] text-[#e0e3e6] font-body selection:bg-secondary-container/30">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-[#191c1e] text-[#d6e3ff]">
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-2xl active:scale-95 duration-150 p-2 hover:bg-[#2e3036] rounded-full transition-colors">arrow_back</button>
<h1 class="font-headline font-bold text-lg tracking-tight">New Repair Entry</h1>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-2xl active:scale-95 duration-150 p-2 hover:bg-[#2e3036] rounded-full transition-colors">notifications</button>
<button class="material-symbols-outlined text-2xl active:scale-95 duration-150 p-2 hover:bg-[#2e3036] rounded-full transition-colors">search</button>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto space-y-6">
<!-- Section: Photos -->
<section class="space-y-3">
<div class="flex items-center justify-between">
<h2 class="font-headline text-sm font-semibold uppercase tracking-widest text-on-surface-variant/70">Photos &amp; Documentation</h2>
<span class="text-[10px] bg-secondary-container/20 text-secondary-fixed px-2 py-0.5 rounded-full border border-secondary-container/30">MANDATORY</span>
</div>
<div class="grid grid-cols-3 gap-3">
<div class="aspect-square relative rounded-xl overflow-hidden bg-[#2e3036] border-2 border-dashed border-outline/20 flex flex-col items-center justify-center group cursor-pointer hover:border-secondary-container/50 transition-all">
<span class="material-symbols-outlined text-outline group-hover:text-secondary-fixed mb-1">add_a_photo</span>
<span class="text-[10px] font-medium text-outline">Device Front</span>
</div>
<div class="aspect-square rounded-xl overflow-hidden bg-[#2e3036] relative group">
<img class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" data-alt="close-up of a cracked smartphone screen with colorful pixels visible through the glass on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTFKaE7aVWHEATShODurMMc5wJ_iR82lqIooFPT9krpkzVOzAk3Nb5J0HHa8aFIySHBEV5dkaYgx2ltuGTskGqFGnuxP78Cr8BqQ4shXx2buNR1jp4Hkmvs9P-Jn9ddaLL6GpesNZqwcvgT3MIHG1BhE5wGi8ftcolZYyoUgEMEV5p83md9gmIuJlcJA2btP-c2V-cm19n0pOPjZ7Q-rcZ2f5G8YFYBLTxLARfAuwdTZPXy8jEyG7EFXz5JLJbh1WsCev49xY6IPo"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<button class="absolute top-2 right-2 bg-black/40 backdrop-blur-md p-1 rounded-full material-symbols-outlined text-sm text-white">close</button>
</div>
<div class="aspect-square relative rounded-xl overflow-hidden bg-[#2e3036] border-2 border-dashed border-outline/20 flex flex-col items-center justify-center group cursor-pointer hover:border-secondary-container/50 transition-all">
<span class="material-symbols-outlined text-outline group-hover:text-secondary-fixed mb-1">add_a_photo</span>
<span class="text-[10px] font-medium text-outline">Add More</span>
</div>
</div>
</section>
<!-- Section: Customer -->
<section class="bg-[#1c1b1f] rounded-2xl p-5 space-y-4 shadow-sm">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary-fixed text-sm">person</span>
<h2 class="font-headline text-base font-semibold text-on-secondary-container">Customer Information</h2>
</div>
<div class="space-y-4">
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Full Name</label>
<input class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white placeholder:text-outline/50" placeholder="e.g. Julianne Moore" type="text"/>
</div>
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Phone Number</label>
<div class="flex items-center">
<div class="bg-[#2e3036] rounded-l-xl px-3 py-3 text-sm text-outline border-r border-[#191c1e]">+91</div>
<input class="w-full bg-[#2e3036] border-none rounded-r-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white placeholder:text-outline/50 tabular-nums" placeholder="9876543210" type="tel"/>
</div>
</div>
</div>
</section>
<!-- Section: Device -->
<section class="bg-[#1c1b1f] rounded-2xl p-5 space-y-4 shadow-sm">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary-fixed text-sm">smartphone</span>
<h2 class="font-headline text-base font-semibold text-on-secondary-container">Device Details</h2>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative col-span-2 sm:col-span-1">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Brand/Model</label>
<select class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container text-white appearance-none">
<option>iPhone 15 Pro Max</option>
<option>Samsung S24 Ultra</option>
<option>Pixel 8 Pro</option>
<option>Other</option>
</select>
</div>
<div class="relative col-span-2 sm:col-span-1">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Device Color</label>
<input class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white placeholder:text-outline/50" placeholder="Titanium Blue" type="text"/>
</div>
<div class="relative col-span-2">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">IMEI / Serial Number</label>
<div class="relative group">
<input class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white placeholder:text-outline/50 tabular-nums font-medium tracking-wider" placeholder="Enter 15-digit IMEI" type="text"/>
<button class="absolute right-2 top-1.5 bottom-1.5 bg-secondary-container text-white px-3 rounded-lg flex items-center gap-1 hover:bg-secondary-container/80 transition-colors active:scale-95">
<span class="material-symbols-outlined text-base">barcode_scanner</span>
<span class="text-[10px] font-bold uppercase">Scan</span>
</button>
</div>
</div>
</div>
</section>
<!-- Section: Repair Info -->
<section class="bg-[#1c1b1f] rounded-2xl p-5 space-y-4 shadow-sm">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary-fixed text-sm">build_circle</span>
<h2 class="font-headline text-base font-semibold text-on-secondary-container">Repair Diagnosis</h2>
</div>
<div class="flex items-center gap-1.5 bg-[#2e3036] px-2.5 py-1 rounded-full">
<span class="w-2 h-2 bg-error-container rounded-full animate-pulse"></span>
<span class="text-[10px] font-bold text-on-error-container uppercase tracking-tight">Received</span>
</div>
</div>
<div class="space-y-4">
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Problem Description</label>
<textarea class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white placeholder:text-outline/50 resize-none" placeholder="Describe the issue, physical damages, and liquid exposure history..." rows="3"></textarea>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Received Date</label>
<input class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white [color-scheme:dark]" type="date"/>
</div>
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Priority</label>
<div class="flex gap-1 bg-[#2e3036] p-1 rounded-xl">
<button class="flex-1 text-[10px] font-bold py-2 rounded-lg bg-[#191c1e] text-white">NORMAL</button>
<button class="flex-1 text-[10px] font-bold py-2 rounded-lg text-outline">URGENT</button>
</div>
</div>
</div>
</div>
</section>
<!-- Section: Commercials -->
<section class="bg-[#1c1b1f] rounded-2xl p-5 space-y-4 shadow-sm">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary-fixed text-sm">payments</span>
<h2 class="font-headline text-base font-semibold text-on-secondary-container">Financial Summary</h2>
</div>
<div class="grid grid-cols-2 gap-x-4 gap-y-5">
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Estimated Cost</label>
<div class="flex items-center">
<span class="absolute left-4 text-outline-variant text-sm tabular-nums">₹</span>
<input class="w-full bg-[#2e3036] border-none rounded-xl pl-8 pr-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white font-semibold tabular-nums" placeholder="0.00" type="number"/>
</div>
</div>
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Advance Received</label>
<div class="flex items-center">
<span class="absolute left-4 text-on-tertiary-container text-sm tabular-nums">₹</span>
<input class="w-full bg-tertiary-container/30 border-none rounded-xl pl-8 pr-4 py-3 text-sm focus:ring-2 focus:ring-tertiary-container transition-all text-tertiary-fixed font-semibold tabular-nums" placeholder="0.00" type="number"/>
</div>
</div>
<div class="col-span-2 h-[1px] bg-outline-variant/10"></div>
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Part Cost (Internal)</label>
<input class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white/50 tabular-nums" placeholder="₹ 0.00" type="number"/>
</div>
<div class="relative">
<label class="block text-[11px] font-medium text-outline-variant mb-1.5 ml-1">Part Supplier</label>
<input class="w-full bg-[#2e3036] border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary-container transition-all text-white/50" placeholder="Global Tech" type="text"/>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-[#1c1b1f]/90 backdrop-blur-xl border-t border-white/5 px-4 pb-8 pt-4">
<div class="max-w-2xl mx-auto flex gap-3">
<button class="flex-1 bg-[#2e3036] text-white py-4 rounded-2xl font-headline font-bold text-sm tracking-tight active:scale-[0.98] transition-transform">
                Draft Save
            </button>
<button class="flex-[2] bg-gradient-to-r from-secondary to-primary-container text-white py-4 rounded-2xl font-headline font-bold text-sm tracking-tight flex items-center justify-center gap-2 shadow-lg shadow-secondary/20 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined text-lg">save</span>
                Save Repair Job
            </button>
</div>
</div>
<!-- Navigation Suppressed for Focused Form Flow as per UI Guide -->
</body></html>
