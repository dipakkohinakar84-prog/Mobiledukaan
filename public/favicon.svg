<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Main body gradient: cyan top-left → blue mid → purple bottom-right -->
    <linearGradient id="bodyGrad" x1="20" y1="70" x2="180" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#00CFFF"/>
      <stop offset="0.45" stop-color="#1E6FFF"/>
      <stop offset="1"    stop-color="#6B21D6"/>
    </linearGradient>
    <!-- Stroke/edge glow gradient -->
    <linearGradient id="strokeGrad" x1="20" y1="60" x2="180" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#6EF9FF"/>
      <stop offset="0.5"  stop-color="#3B8FFF"/>
      <stop offset="1"    stop-color="#9B50FF"/>
    </linearGradient>
    <!-- Awning panels gradient -->
    <linearGradient id="awningGrad" x1="10" y1="10" x2="190" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#A8F8FF"/>
      <stop offset="0.4"  stop-color="#4AC8FF"/>
      <stop offset="1"    stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Top gloss on awning panels -->
    <linearGradient id="glossTop" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="white" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.2"/>
      <stop offset="1"   stop-color="white" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Letter fill gradient -->
    <linearGradient id="letterGrad" x1="30" y1="70" x2="170" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#1A6FFF"/>
      <stop offset="1"   stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── PHONE FRAME (outer rounded rect) ── -->
  <!-- Glow behind frame -->
  <rect x="28" y="65" width="144" height="128" rx="22" fill="none"
        stroke="url(#strokeGrad)" stroke-width="10" opacity="0.4" filter="url(#glow)"/>
  <!-- Frame stroke -->
  <rect x="28" y="65" width="144" height="128" rx="22" fill="none"
        stroke="url(#strokeGrad)" stroke-width="6"/>
  <!-- Dark interior fill -->
  <rect x="31" y="68" width="138" height="122" rx="19" fill="#070E28"/>

  <!-- ── "P" LETTER (left) ── -->
  <!-- Vertical bar of P -->
  <rect x="48" y="80" width="18" height="96" rx="9" fill="url(#letterGrad)" filter="url(#softglow)"/>
  <!-- P bowl — thick semicircle -->
  <path d="M66 80 H96 C114 80 124 93 124 107 C124 121 114 133 96 133 H66 Z"
        fill="url(#letterGrad)" filter="url(#softglow)"/>
  <!-- P bowl hollow -->
  <path d="M72 91 H93 C106 91 112 98 112 107 C112 116 106 122 93 122 H72 Z"
        fill="#070E28"/>

  <!-- ── "D" BRACKET (right) ── -->
  <!-- Top bar -->
  <rect x="134" y="80" width="18" height="15" rx="7" fill="url(#letterGrad)" filter="url(#softglow)"/>
  <!-- Vertical right bar -->
  <rect x="136" y="80" width="16" height="96" rx="8" fill="url(#letterGrad)" filter="url(#softglow)"/>
  <!-- Bottom bar -->
  <rect x="134" y="161" width="18" height="15" rx="7" fill="url(#letterGrad)" filter="url(#softglow)"/>

  <!-- Home indicator -->
  <rect x="82" y="181" width="36" height="5" rx="2.5" fill="url(#letterGrad)" opacity="0.55"/>

  <!-- ══════════════════════════════════════
       AWNING (3 rounded panels above frame)
       ══════════════════════════════════════ -->

  <!-- Panel 1 (left) -->
  <path d="M30 65 Q28 30 42 18 L76 18 Q76 50 60 65 Z" fill="url(#awningGrad)"/>
  <path d="M30 65 Q28 30 42 18 L76 18 Q76 50 60 65 Z" fill="url(#glossTop)"/>
  <!-- Panel 1 dark groove -->
  <path d="M76 18 Q78 50 62 65" fill="none" stroke="#0a1440" stroke-width="5"/>

  <!-- Panel 2 (center) -->
  <path d="M78 18 L122 18 Q122 52 104 65 Q86 52 78 18 Z" fill="url(#awningGrad)"/>
  <path d="M78 18 L122 18 Q122 52 104 65 Q86 52 78 18 Z" fill="url(#glossTop)"/>
  <!-- Panel 2 dark grooves -->
  <path d="M78 18 Q80 52 96 65"  fill="none" stroke="#0a1440" stroke-width="5"/>
  <path d="M122 18 Q120 52 112 65" fill="none" stroke="#0a1440" stroke-width="5"/>

  <!-- Panel 3 (right) -->
  <path d="M124 18 L158 18 Q172 30 170 65 L140 65 Q124 52 124 18 Z" fill="url(#awningGrad)"/>
  <path d="M124 18 L158 18 Q172 30 170 65 L140 65 Q124 52 124 18 Z" fill="url(#glossTop)"/>
  <!-- Panel 3 dark groove -->
  <path d="M124 18 Q126 52 138 65" fill="none" stroke="#0a1440" stroke-width="5"/>

  <!-- Top edge bar connecting all panels -->
  <rect x="28" y="13" width="144" height="9" rx="4.5" fill="url(#awningGrad)"/>
  <rect x="28" y="13" width="144" height="4" rx="2" fill="white" opacity="0.55"/>
</svg>
