<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 68" fill="none">
  <defs>
    <linearGradient id="dukGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0"   stop-color="#00D4FF"/>
      <stop offset="0.5" stop-color="#4488FF"/>
      <stop offset="1"   stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0"   stop-color="#00D4FF"/>
      <stop offset="0.5" stop-color="#4488FF"/>
      <stop offset="1"   stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="awningGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#4488FF"/>
    </linearGradient>
  </defs>

  <!-- Shop icon outline (rounded rect with awning) -->
  <rect x="6" y="20" width="52" height="42" rx="8" ry="8" stroke="url(#iconGrad)" stroke-width="3.5" fill="none"/>
  <!-- Awning / canopy -->
  <path d="M6 24 Q6 10 16 10 L48 10 Q58 10 58 24" stroke="url(#awningGrad)" stroke-width="3.5" fill="none"/>
  <!-- Awning scallops -->
  <path d="M10 24 Q18 16 26 24 Q34 16 38 24 Q44 16 54 24" stroke="url(#awningGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Letter P inside -->
  <text x="22" y="52" font-family="'Outfit','Inter','Segoe UI',system-ui,sans-serif" font-weight="800" font-size="28" fill="url(#iconGrad)">P</text>

  <!-- PhoneDukaan wordmark text -->
  <text
    x="72"
    y="44"
    font-family="'Outfit', 'Inter', 'Segoe UI', system-ui, sans-serif"
    font-weight="700"
    font-size="32"
    letter-spacing="-0.5"
  >
    <tspan fill="white">Phone</tspan><tspan fill="url(#dukGrad)">Dukaan</tspan>
  </text>
</svg>
